<div style="display: flex; justify-content: space-between; align-items: center; margin-right: 1rem;">
    <h1 style="margin-top: 0;">Jobs</h1>

    <mat-form-field appearance="outline" style="width: 300px; margin-top: 1rem;">
        <mat-label>Search jobs...</mat-label>
        <input matInput [formControl]="searchControl" placeholder="Ex. 'Software Engineer'">
        <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
</div>

@if (isLoading) {
<mat-progress-bar mode="indeterminate"></mat-progress-bar>
}

<div class="table-container">
    <table mat-table [dataSource]="jobs" class="mat-elevation-z8">

        <ng-container matColumnDef="job">
            <th mat-header-cell *matHeaderCellDef> Job </th>
            <td mat-cell *matCellDef="let element">
                <div class="name-and-logo">
                    <strong>{{element.title}}</strong>
                </div>
            </td>
        </ng-container>

        <ng-container matColumnDef="location">
            <th mat-header-cell *matHeaderCellDef> Location </th>
            <td mat-cell *matCellDef="let element"> {{element.location}} </td>
        </ng-container>

        <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef> Type </th>
            <td mat-cell *matCellDef="let element">
                <mat-chip>{{element.type}}</mat-chip>
            </td>
        </ng-container>

        <ng-container matColumnDef="posted">
            <th mat-header-cell *matHeaderCellDef> Posted </th>
            <td mat-cell *matCellDef="let element">
                {{element.createdAt | date:'mediumDate'}}
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator [length]="totalItems" [pageSize]="pageSize" [pageIndex]="pageIndex"
        [pageSizeOptions]="[5, 10, 25, 50]" (page)="onPageChange($event)">
    </mat-paginator>
</div>
